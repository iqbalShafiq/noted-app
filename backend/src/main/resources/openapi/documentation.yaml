openapi: 3.0.3
info:
  title: Noted API
  description: API documentation for Noted - A note-taking application with sync capabilities
  version: 1.0.0
  contact:
    name: Noted Team

servers:
  - url: http://localhost:8080/api
    description: Local development server

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      description: Check if the API is running
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      summary: Register new user
      description: Create a new user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Login
      description: Authenticate user and get access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      summary: Forgot password
      description: Reset user password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthForgotPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthForgotPasswordResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notes:
    get:
      summary: Get owned notes
      description: Retrieve all notes owned by the authenticated user
      responses:
        '200':
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoteDto'

    post:
      summary: Create note
      description: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteDto'

  /notes/{noteId}:
    get:
      summary: Get note by ID
      description: Retrieve a specific note by its ID
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Note found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteDto'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notes/{noteId}/share:
    post:
      summary: Share note
      description: Share a note with another user
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareNoteRequest'
      responses:
        '201':
          description: Note shared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareNoteResponse'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notes/{noteId}/engagement:
    get:
      summary: Get note engagement
      description: Retrieve love and comment counters for an accessible note.
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Engagement retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteEngagementDto'
        '400':
          description: Invalid note id or inaccessible note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notes/{noteId}/reactions/love:
    put:
      summary: Add love reaction
      description: Add LOVE reaction by authenticated user and return latest engagement.
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Love reaction applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteEngagementDto'
        '400':
          description: Invalid note id or inaccessible note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove love reaction
      description: Remove LOVE reaction by authenticated user and return latest engagement.
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Love reaction removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteEngagementDto'
        '400':
          description: Invalid note id or inaccessible note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notes/{noteId}/comments:
    get:
      summary: List note comments
      description: List comments for an accessible note in newest-first order.
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: beforeEpochMillis
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Comments page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteCommentsPageDto'
        '400':
          description: Invalid request or inaccessible note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create note comment
      description: Create a new comment for an accessible note.
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteCommentDto'
        '400':
          description: Invalid request or inaccessible note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notes/shared-with-me:
    get:
      summary: Get shared notes
      description: Retrieve all notes shared with the authenticated user
      responses:
        '200':
          description: List of shared notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoteDto'

  /notes/explore:
    get:
      summary: Explore notes
      description: Get public notes from other users
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of public notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoteDto'

  /sync/push:
    post:
      summary: Push sync
      description: Push local mutations to server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPushRequest'
      responses:
        '200':
          description: Sync successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPushResponse'

  /sync/pull:
    get:
      summary: Pull sync
      description: Pull server changes since last cursor
      parameters:
        - name: cursor
          in: query
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '200':
          description: Sync data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPullResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AuthRegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 6
          format: password
      required:
        - username
        - password

    AuthLoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
      required:
        - username
        - password

    AuthForgotPasswordRequest:
      type: object
      properties:
        username:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 6
      required:
        - username
        - newPassword

    AuthForgotPasswordResponse:
      type: object
      properties:
        username:
          type: string
        message:
          type: string

    AuthResponse:
      type: object
      properties:
        userId:
          type: string
        username:
          type: string
        accessToken:
          type: string
        expiresInSeconds:
          type: integer
          format: int64

    CreateNoteRequest:
      type: object
      properties:
        ownerUserId:
          type: string
        content:
          type: string
          maxLength: 10000
      required:
        - ownerUserId
        - content

    ShareNoteRequest:
      type: object
      properties:
        recipientUserId:
          type: string
      required:
        - recipientUserId

    NoteDto:
      type: object
      properties:
        id:
          type: string
        ownerUserId:
          type: string
        content:
          type: string
        createdAtEpochMillis:
          type: integer
          format: int64
        sharedWithUserIds:
          type: array
          items:
            type: string

    NoteReactionType:
      type: string
      description: Supported reactions for a note.
      enum: [LOVE]
      example: LOVE

    NoteEngagementDto:
      type: object
      description: Aggregate engagement counters for a note.
      properties:
        noteId:
          type: string
          example: note-123
        loveCount:
          type: integer
          example: 12
        hasLovedByMe:
          type: boolean
          example: true
        commentCount:
          type: integer
          example: 4
      required:
        - noteId
        - loveCount
        - hasLovedByMe
        - commentCount

    NoteCommentDto:
      type: object
      description: Public comment entry attached to a note.
      properties:
        id:
          type: string
          example: comment-456
        noteId:
          type: string
          example: note-123
        authorUserId:
          type: string
          example: user-789
        authorUsername:
          type: string
          example: maria
        content:
          type: string
          example: Great summary.
        createdAtEpochMillis:
          type: integer
          format: int64
          example: 1735689600000
      required:
        - id
        - noteId
        - authorUserId
        - authorUsername
        - content
        - createdAtEpochMillis

    NoteCommentsPageDto:
      type: object
      description: Paged comments response sorted by newest first.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NoteCommentDto'
        nextBeforeEpochMillis:
          type: integer
          format: int64
          nullable: true
          description: Cursor for fetching older comments; null means no more pages.
          example: 1735689500000
      required:
        - items

    CreateNoteCommentRequest:
      type: object
      description: Request body for creating a new note comment.
      properties:
        content:
          type: string
          maxLength: 500
          pattern: '.*\S.*'
          description: Comment body. Raw input max length is 500, must contain at least one non-whitespace character, and is trimmed before storage.
          example: Thanks for sharing this note.
      required:
        - content

    ShareNoteResponse:
      type: object
      properties:
        noteId:
          type: string
        recipientUserId:
          type: string
        sharedAtEpochMillis:
          type: integer
          format: int64

    SyncPushRequest:
      type: object
      properties:
        deviceId:
          type: string
        mutations:
          type: array
          items:
            $ref: '#/components/schemas/SyncMutationDto'
      required:
        - deviceId
        - mutations

    SyncMutationDto:
      type: object
      properties:
        operationId:
          type: string
        noteId:
          type: string
        type:
          type: string
          enum: [UPSERT, DELETE]
        content:
          type: string
          nullable: true
        clientUpdatedAtEpochMillis:
          type: integer
          format: int64
        baseVersion:
          type: integer
          format: int64
          nullable: true
      required:
        - operationId
        - noteId
        - type
        - clientUpdatedAtEpochMillis

    SyncPushResponse:
      type: object
      properties:
        acceptedOperationIds:
          type: array
          items:
            type: string
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/SyncConflictDto'
        appliedNotes:
          type: array
          items:
            $ref: '#/components/schemas/SyncedNoteDto'
        cursor:
          type: integer
          format: int64

    SyncConflictDto:
      type: object
      properties:
        operationId:
          type: string
        noteId:
          type: string
        reason:
          type: string
        serverNote:
          $ref: '#/components/schemas/SyncedNoteDto'
          nullable: true

    SyncPullResponse:
      type: object
      properties:
        userId:
          type: string
        cursor:
          type: integer
          format: int64
        notes:
          type: array
          items:
            $ref: '#/components/schemas/SyncedNoteDto'

    SyncedNoteDto:
      type: object
      properties:
        noteId:
          type: string
        ownerUserId:
          type: string
        content:
          type: string
        createdAtEpochMillis:
          type: integer
          format: int64
        updatedAtEpochMillis:
          type: integer
          format: int64
        deletedAtEpochMillis:
          type: integer
          format: int64
          nullable: true
        version:
          type: integer
          format: int64
        sharedWithUserIds:
          type: array
          items:
            type: string
