name: noted-backend

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: noted
      POSTGRES_USER: noted_user
      POSTGRES_PASSWORD: noted_password
    ports:
      - "5433:5432"
    volumes:
      - noted_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noted_user -d noted"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  noted_postgres_data:
